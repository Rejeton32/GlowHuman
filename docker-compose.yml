version: '3.8'

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - '5432:5432'

  redis:
    image: redis:latest
    ports:
      - '6379:6379'

  backend:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/mydatabase
      REDIS_URL: redis://redis:6379
    ports:
      - '8000:8000'
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

networks:
  default:
    driver: bridge
